<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>pMemo | Spaced Repetition with Google Sheets</title>
    <!-- Google Fonts & simple icons (Font Awesome) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script type="module" crossorigin src="/Flashcards/assets/index-6HZKJbTd.js"></script>
  <link rel="stylesheet" crossorigin href="/Flashcards/assets/index-DKYsG9Nk.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- top bar -->
        <header class="glass-header">
            <div class="logo-area">
                <i class="fas fa-brain logo-icon"></i>
                <h1>pMemo</h1>
                <span class="flashcard-badge">Flashcard</span>
            </div>
            <div class="header-actions">
                <div id="authStatus" class="auth-chip">
                    <i class="fas fa-circle-notch fa-spin"></i> connecting
                </div>
                <button id="syncNowBtn" class="icon-btn" title="Sync with Google Sheets">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button id="configSheetBtn" class="icon-btn" title="Configure spreadsheet">
                    <i class="fas fa-table"></i>
                </button>
            </div>
        </header>

        <!-- main dashboard layout -->
        <div class="dashboard">
            <!-- left sidebar (decks & stats) -->
            <aside class="sidebar glass-panel">
                <div class="stats-card">
                    <h3><i class="fas fa-chart-line"></i> Study stats</h3>
                    <div class="stat-item">
                        <span>Due cards</span>
                        <span id="dueCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Total cards</span>
                        <span id="totalCardsCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Mastered (EF>2.3)</span>
                        <span id="masteredCount">0</span>
                    </div>
                </div>
                <div class="decks-section">
                    <h3><i class="fas fa-layer-group"></i> Decks</h3>
                    <div id="deckListContainer" class="deck-list">
                        <!-- dynamic deck filters -->
                        <button class="deck-filter active" data-deck="all">All decks</button>
                    </div>
                </div>
                <button id="addCardBtn" class="btn-primary btn-full">
                    <i class="fas fa-plus-circle"></i> New flashcard
                </button>
                <div class="sheet-info">
                    <i class="fas fa-google"></i> 
                    <span id="sheetIdPreview">No sheet linked</span>
                </div>
            </aside>

            <!-- main flashcard area -->
            <main class="study-area">
                <div id="reviewContainer" class="flashcard-container">
                    <div class="empty-state" id="emptyState">
                        <i class="fas fa-smile-wink"></i>
                        <h3>All caught up! 🎉</h3>
                        <p>No cards due right now. Add new cards or sync later.</p>
                        <button id="forceStudyBtn" class="btn-outline">Study any card</button>
                    </div>
                    <div id="activeCard" style="display: none;">
                        <div class="flashcard" id="flashcard">
                            <div class="card-front" id="cardFront">
                                <div class="card-content"></div>
                            </div>
                            <div class="card-back" id="cardBack">
                                <div class="card-content"></div>
                            </div>
                        </div>
                        <div class="answer-buttons" id="answerButtons">
                            <button class="answer-btn again" data-grade="again"><i class="fas fa-times-circle"></i> Again</button>
                            <button class="answer-btn hard" data-grade="hard"><i class="fas fa-hourglass-half"></i> Hard</button>
                            <button class="answer-btn good" data-grade="good"><i class="fas fa-check-circle"></i> Good</button>
                            <button class="answer-btn easy" data-grade="easy"><i class="fas fa-rocket"></i> Easy</button>
                        </div>
                        <div class="card-progress">
                            <span id="cardDeckTag"></span>
                            <span id="cardDueHint"></span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- modal for sheet config & new card -->
    <div id="sheetModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-modal">&times;</span>
            <h2><i class="fab fa-google"></i> Google Sheets Setup</h2>
            <p>Connect to a spreadsheet with two sheets: <strong>"Cards"</strong> and <strong>"Progress"</strong>.</p>
            <label>Spreadsheet ID:</label>
            <input type="text" id="spreadsheetIdInput" placeholder="1ABCxyz...">
            <button id="saveSheetIdBtn" class="btn-primary">Load & sync</button>
            <hr>
            <div class="oauth-section">
                <button id="googleSignInBtn" class="btn-google"><i class="fab fa-google"></i> Sign in with Google</button>
                <div id="userEmailDisplay" class="user-email"></div>
            </div>
        </div>
    </div>

    <div id="newCardModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-modal">&times;</span>
            <h2><i class="fas fa-plus"></i> Create new flashcard</h2>
            <div class="form-group">
                <label>Front (question)</label>
                <textarea id="newFront" rows="2" placeholder="e.g., What is spaced repetition?"></textarea>
            </div>
            <div class="form-group">
                <label>Back (answer)</label>
                <textarea id="newBack" rows="3" placeholder="e.g., A technique that increases intervals..."></textarea>
            </div>
            <div class="form-group">
                <label>Deck</label>
                <input type="text" id="newDeck" placeholder="General">
            </div>
            <div class="form-group">
                <label>Tags (comma separated)</label>
                <input type="text" id="newTags" placeholder="vocabulary, science">
            </div>
            <button id="confirmNewCardBtn" class="btn-primary">Create card</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Google API libraries -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
</body>
</html>
